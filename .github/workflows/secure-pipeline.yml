name: Secure CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Scan for leaked secrets (Passwords, API Keys)
      - name: Run Gitleaks Scan
        uses: zricethezav/gitleaks-action@v2

      # 3. Static Analysis (SAST) for code vulnerabilities
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1

      # 4. Scan project dependencies (Filesystem scan)
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'

      # 5. Build the Docker Image
      - name: Build Docker Image
        run: docker build -t secure-app .

      # 6. Scan the Docker Image layers for vulnerabilities
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app'
          format: 'table'

      # 7. Login to Docker Hub (Requires Github Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Tag and Push to Registry
      - name: Push Image
        run: |
          docker tag secure-app ${{ secrets.DOCKER_USERNAME }}/secure-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/secure-app:latest
